<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FitEats - 你的专属健身食谱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2ECB71;
      --primary-light: #e8f8f0;
      --secondary: #FF7A45;
      --secondary-light: #fff4ed;
      --accent: #3498DB;
      --accent-light: #e8f4fd;
      --bg: #F5F7FA;
      --white: #FFFFFF;
      --text: #1A1A2E;
      --text-secondary: #6B7280;
      --border: #E5E7EB;
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .oswald {
      font-family: 'Oswald', sans-serif;
    }

    /* App Container */
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      padding-bottom: 70px;
    }

    /* Header */
    .header {
      background: var(--white);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title svg {
      width: 28px;
      height: 28px;
    }

    /* Tab Content */
    .tab-content {
      display: none;
      padding: 16px;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Filter Section */
    .filter-section {
      margin-bottom: 16px;
    }

    .filter-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-tag {
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
    }

    .filter-tag:hover {
      border-color: var(--primary);
    }

    .filter-tag.active {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    .filter-tag.active[data-type="fat"] {
      background: var(--primary);
    }

    .filter-tag.active[data-type="muscle"] {
      background: var(--secondary);
    }

    .filter-tag.active[data-type="shape"] {
      background: var(--accent);
    }

    .filter-tag.active[data-time] {
      background: var(--secondary);
    }

    /* Recipe Card */
    .recipe-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .recipe-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .recipe-card:active {
      transform: scale(0.98);
    }

    .card-header {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-tags {
      display: flex;
      gap: 6px;
    }

    .card-tag {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .card-tag.goal-fat {
      background: var(--primary-light);
      color: var(--primary);
    }

    .card-tag.goal-muscle {
      background: var(--secondary-light);
      color: var(--secondary);
    }

    .card-tag.goal-shape {
      background: var(--accent-light);
      color: var(--accent);
    }

    .card-tag.time {
      background: var(--bg);
      color: var(--text-secondary);
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .action-btn:hover {
      background: var(--border);
    }

    .action-btn.active {
      background: #FEF3C7;
    }

    .action-btn svg {
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
    }

    .action-btn.active svg {
      color: #F59E0B;
      fill: #F59E0B;
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card-nutrition {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .nutrition-item {
      text-align: center;
    }

    .nutrition-icon {
      font-size: 16px;
      margin-bottom: 2px;
    }

    .nutrition-value {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .nutrition-label {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .card-footer {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .difficulty-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .difficulty-tag svg {
      width: 14px;
      height: 14px;
    }

    .view-btn {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .view-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ============ 抽卡页面 ============ */
    .gacha-page {
      text-align: center;
      padding: 20px 16px;
    }

    .gacha-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .gacha-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }

    .goal-selector {
      margin-bottom: 24px;
    }

    .goal-options {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
    }

    .goal-option {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: var(--white);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .goal-option:hover {
      border-color: var(--primary);
    }

    .goal-option.active {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: scale(1.05);
    }

    .goal-option[data-goal="fat"].active {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .goal-option[data-goal="muscle"].active {
      border-color: var(--secondary);
      background: var(--secondary-light);
    }

    .goal-option[data-goal="shape"].active {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .goal-icon {
      font-size: 32px;
    }

    .goal-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .time-selector {
      margin-bottom: 40px;
    }

    .time-options {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .time-option {
      padding: 10px 20px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--white);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .time-option:hover {
      border-color: var(--secondary);
    }

    .time-option.active {
      background: var(--secondary);
      border-color: var(--secondary);
      color: var(--white);
    }

    .gacha-btn {
      width: 85%;
      max-width: 300px;
      height: 56px;
      border: none;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--accent) 0%, #5B9FD4 100%);
      color: var(--white);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 0 auto;
      box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
    }

    .gacha-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
    }

    .gacha-btn:active {
      transform: scale(0.96);
    }

    .gacha-btn:disabled {
      background: var(--border);
      box-shadow: none;
      cursor: not-allowed;
    }

    .gacha-btn svg {
      width: 24px;
      height: 24px;
    }

    .gacha-btn.loading svg {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ============ 采购页面 ============ */
    .shop-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .shop-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
    }

    .clear-btn {
      font-size: 13px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
    }

    .shop-category {
      margin-bottom: 24px;
    }

    .category-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-icon {
      font-size: 18px;
    }

    .shop-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      background: var(--white);
      border-radius: var(--radius);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .shop-item:hover {
      background: #f9fafb;
    }

    .shop-item.checked {
      opacity: 0.5;
    }

    .shop-item.checked .item-name {
      text-decoration: line-through;
    }

    .item-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .shop-item.checked .item-checkbox {
      background: var(--primary);
      border-color: var(--primary);
    }

    .item-checkbox svg {
      width: 14px;
      height: 14px;
      color: var(--white);
      opacity: 0;
    }

    .shop-item.checked .item-checkbox svg {
      opacity: 1;
    }

    .item-name {
      flex: 1;
      font-size: 14px;
      color: var(--text);
    }

    .item-amount {
      font-size: 13px;
      color: var(--text-secondary);
      font-family: 'Oswald', sans-serif;
    }

    .shop-stats {
      position: fixed;
      bottom: 70px;
      left: 0;
      right: 0;
      max-width: 430px;
      margin: 0 auto;
      padding: 14px 20px;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stats-text {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .stats-count {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      color: var(--primary);
    }

    /* ============ 我的页面 ============ */
    .profile-header {
      background: linear-gradient(135deg, var(--primary) 0%, #36A066 100%);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin-bottom: 20px;
      color: var(--white);
      text-align: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--white);
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .profile-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-desc {
      font-size: 13px;
      opacity: 0.8;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px 12px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .menu-section {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:hover {
      background: #f9fafb;
    }

    .menu-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
      font-size: 20px;
    }

    .menu-text {
      flex: 1;
      font-size: 15px;
      color: var(--text);
    }

    .menu-arrow {
      color: var(--text-secondary);
    }

    .menu-arrow svg {
      width: 20px;
      height: 20px;
    }

    /* ============ Tab Bar ============ */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 430px;
      margin: 0 auto;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      z-index: 1000;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 16px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }

    .tab-item.active {
      color: var(--primary);
    }

    .tab-item svg {
      width: 24px;
      height: 24px;
    }

    .tab-label {
      font-size: 11px;
      font-weight: 500;
    }

    /* ============ Modal ============ */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--white);
      border-radius: 16px;
      width: 90%;
      max-width: 380px;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(50px) scale(0.9);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 1;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close svg {
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
    }

    .modal-body {
      padding: 20px;
    }

    /* Gacha Result Modal */
    .gacha-result {
      text-align: center;
    }

    .gacha-celebration {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .gacha-dish-image {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    .gacha-dish-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .gacha-nutrition {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 14px;
      background: var(--bg);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    .gacha-section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 8px;
      text-align: left;
    }

    .gacha-ingredients {
      margin-bottom: 16px;
    }

    .gacha-ingredient {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .gacha-tips {
      background: #FEF9C3;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 12px;
      color: #92400E;
      margin-bottom: 20px;
      text-align: left;
    }

    .gacha-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-primary {
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary:hover {
      background: #27ae60;
    }

    .btn-secondary {
      padding: 12px 24px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    /* Recipe Detail Modal */
    .detail-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      margin: -20px -20px 16px -20px;
    }

    .detail-tags {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .detail-step {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--text);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      z-index: 3000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-text {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* Confetti */
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 2500;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->

            <div class="empty-icon">🔍</div>
            <p class="empty-text">暂无符合条件的菜谱</p>

            <div class="shop-item ${item.checked ? 'checked' : ''}" onclick="toggleShopItem('${cat.category}', ${idx})">
              <div class="item-checkbox">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </div>
              <span class="item-name">${item.name}</span>
              <span class="item-amount">${item.amount}</span>
            </div>
          `).join('')}
        </div>
      `).join('');

      updateShopStats();
    }

    function updateShopStats() {
      let total = 0, checked = 0;
      shoppingList.forEach(cat => {
        cat.items.forEach(item => {
          total++;
          if (item.checked) checked++;
        });
      });

      let stats = document.querySelector('.shop-stats');
      if (!stats) {
        stats = document.createElement('div');
        stats.className = 'shop-stats';
        document.querySelector('.app').appendChild(stats);
      }
      stats.innerHTML = `
        <span class="stats-text">已购 <span class="stats-count">${checked}/${total}</span> 件</span>
        <button class="btn-primary" style="padding: 10px 20px; font-size: 14px;" onclick="addToCart()">一键添加新菜谱食材</button>
      `;
    }

    function updateProfile() {
      document.getElementById('checkin-days').textContent = checkinDays;
      document.getElementById('unlock-count').textContent = favorites.length;
      document.getElementById('weight-change').textContent = '-5kg';
    }

    // ============ 交互函数 ============
    function toggleFavorite(id, event) {
      event.stopPropagation();
      const idx = favorites.indexOf(id);
      if (idx > -1) {
        favorites.splice(idx, 1);
        showToast('已取消收藏');
      } else {
        favorites.push(id);
        showToast('已添加到收藏 ⭐');
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
      renderRecipes();
    }

    function toggleShopItem(category, index) {
      shoppingList.find(c => c.category === category).items[index].checked = !shoppingList.find(c => c.category === category).items[index].checked;
      localStorage.setItem('shopping', JSON.stringify(shoppingList));
      renderShopping();
    }

    function showRecipeDetail(id) {
      const recipe = recipes.find(r => r.id === id);
      if (!recipe) return;

      const modal = document.getElementById('modal');
      const title = document.getElementById('modal-title');
      const body = document.getElementById('modal-body');

      title.textContent = recipe.name;
      body.innerHTML = `
        <img class="detail-image" src="${recipe.image}" alt="${recipe.name}" onerror="this.style.display='none'">
        <div class="detail-tags">
          <span class="card-tag goal-${recipe.goal}">${goalNames[recipe.goal]}</span>
          <span class="card-tag time">${timeNames[recipe.time]}</span>
          <span class="card-tag time">${recipe.difficulty}</span>
        </div>
        <div class="card-nutrition" style="margin-bottom: 20px;">
          <div class="nutrition-item">
            <div class="nutrition-icon">🔥</div>
            <div class="nutrition-value">${recipe.calories}</div>
            <div class="nutrition-label">千卡</div>
          </div>
          <div class="nutrition-item">
            <div class="nutrition-icon">💪</div>
            <div class="nutrition-value">${recipe.protein}g</div>
            <div class="nutrition-label">蛋白</div>
          </div>
          <div class="nutrition-item">
            <div class="nutrition-icon">🍞</div>
            <div class="nutrition-value">${recipe.carbs}g</div>
            <div class="nutrition-label">碳水</div>
          </div>
          <div class="nutrition-item">
            <div class="nutrition-icon">🥑</div>
            <div class="nutrition-value">${recipe.fat}g</div>
            <div class="nutrition-label">脂肪</div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">📝 食材清单</div>
          ${recipe.ingredients.map(i => `
            <div class="gacha-ingredient">
              <span>${i.name}</span>
              <span style="color: var(--text-secondary)">${i.amount}</span>
            </div>
          `).join('')}
        </div>
        <div class="detail-section">
          <div class="detail-section-title">👩‍🍳 制作步骤</div>
          ${recipe.steps.map((s, i) => `
            <div class="detail-step">
              <span class="step-number">${i + 1}</span>
              <span class="step-text">${s}</span>
            </div>
          `).join('')}
        </div>
        <div class="gacha-tips">
          💡 ${recipe.tips}
        </div>
        <button class="btn-primary" style="width: 100%;" onclick="addToShopping('${recipe.name}')">
          加入采购清单 🛒
        </button>
      `;

      modal.classList.add('active');
    }

    function showGachaResult(recipe) {
      const modal = document.getElementById('modal');
      const title = document.getElementById('modal-title');
      const body = document.getElementById('modal-body');

      title.textContent = '🎉 抽中啦！';
      body.innerHTML = `
        <div class="gacha-result">
          <div class="gacha-celebration">恭喜抽中你的专属健身餐！</div>
          <img class="gacha-dish-image" src="${recipe.image}" alt="${recipe.name}" onerror="this.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'">
          <h3 class="gacha-dish-name">${recipe.name}</h3>
          <div class="detail-tags" style="justify-content: center; margin-bottom: 16px;">
            <span class="card-tag goal-${recipe.goal}">${goalNames[recipe.goal]}</span>
            <span class="card-tag time">${timeNames[recipe.time]}</span>
          </div>
          <div class="gacha-nutrition">
            <div class="nutrition-item">
              <div class="nutrition-icon">🔥</div>
              <div class="nutrition-value">${recipe.calories}</div>
              <div class="nutrition-label">千卡</div>
            </div>
            <div class="nutrition-item">
              <div class="nutrition-icon">💪</div>
              <div class="nutrition-value">${recipe.protein}g</div>
              <div class="nutrition-label">蛋白</div>
            </div>
            <div class="nutrition-item">
              <div class="nutrition-icon">🍞</div>
              <div class="nutrition-value">${recipe.carbs}g</div>
              <div class="nutrition-label">碳水</div>
            </div>
            <div class="nutrition-item">
              <div class="nutrition-icon">🥑</div>
              <div class="nutrition-value">${recipe.fat}g</div>
              <div class="nutrition-label">脂肪</div>
            </div>
          </div>
          <div class="gacha-ingredients">
            <div class="gacha-section-title">🥗 精确食材清单（直接照买）</div>
            ${recipe.ingredients.map(i => `
              <div class="gacha-ingredient">
                <span>${i.name}</span>
                <span style="color: var(--text-secondary)">${i.amount}</span>
              </div>
            `).join('')}
          </div>
          <div class="gacha-tips">
            💡 ${recipe.tips}
          </div>
          <div class="gacha-actions">
            <button class="btn-primary" onclick="addToShopping('${recipe.name}')">
              加入采购清单 →
            </button>
            <button class="btn-secondary" onclick="switchTab('home'); closeModal();">
              查看更多菜谱
            </button>
          </div>
        </div>
      `;

      modal.classList.add('active');
    }

    function addToShopping(dishName) {
      showToast(`已将「${dishName}」食材加入清单`);
      closeModal();
    }

    function addToCart() {
      const randomRecipe = recipes[Math.floor(Math.random() * recipes.length)];
      showToast(`已添加「${randomRecipe.name}」食材到清单`);
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function createConfetti() {
      const canvas = document.createElement('canvas');
      canvas.className = 'confetti';
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = [];
      for (let i = 0; i < 100; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          size: Math.random() * 8 + 4,
          color: ['#2ECB71', '#FF7A45', '#3498DB', '#F59E0B'][Math.floor(Math.random() * 4)],
          speed: Math.random() * 3 + 2,
          angle: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 0.2
        });
      }

      let frame = 0;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
          ctx.restore();
          p.y += p.speed;
          p.x += Math.sin(p.angle) * 0.5;
          p.angle += p.spin;
        });
        frame++;
        if (frame < 120) requestAnimationFrame(animate);
        else canvas.remove();
      }
      animate();
    }

    // ============ 事件绑定 ============
    document.querySelectorAll('.tab-item').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // 首页筛选
    document.getElementById('goal-filters').addEventListener('click', e => {
      if (e.target.classList.contains('filter-tag')) {
        document.querySelectorAll('#goal-filters .filter-tag').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentGoal = e.target.dataset.type;
        renderRecipes();
      }
    });

    document.getElementById('time-filters').addEventListener('click', e => {
      if (e.target.classList.contains('filter-tag')) {
        document.querySelectorAll('#time-filters .filter-tag').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentTime = e.target.dataset.time;
        renderRecipes();
      }
    });

    // 抽卡选择
    document.querySelectorAll('.goal-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.goal-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
      });
    });

    document.querySelectorAll('.time-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.time-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
      });
    });

    // 抽卡按钮
    document.getElementById('gacha-btn').addEventListener('click', function() {
      const btn = this;
      const selectedGoal = document.querySelector('.goal-option.active').dataset.goal;
      const selectedTime = document.querySelector('.time-option.active').dataset.time;

      btn.disabled = true;
      btn.classList.add('loading');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
        </svg>
        抽卡中...
      `;

      setTimeout(() => {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7.5 18c-.83 0-1.5-.67-1.5-1.5S6.67 15 7.5 15s1.5.67 1.5 1.5S8.33 18 7.5 18zm0-9C6.67 9 6 8.33 6 7.5S6.67 6 7.5 6 9 6.67 9 7.5 8.33 9 7.5 9zm4.5 4.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4.5 4.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm0-9c-.83 0-1.5-.67-1.5-1.5S15.67 6 16.5 6s1.5.67 1.5 1.5S17.33 9 16.5 9z"/>
          </svg>
          一键抽卡
        `;

        let candidates = recipes.filter(r => r.goal === selectedGoal && r.time === selectedTime);
        if (candidates.length === 0) candidates = recipes;
        const result = candidates[Math.floor(Math.random() * candidates.length)];
        showGachaResult(result);
      }, 1000);
    });

    // 模态框关闭
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target.classList.contains('modal-overlay')) closeModal();
    });

    // 采购清空
    document.getElementById('clear-shop').addEventListener('click', () => {
      shoppingList.forEach(cat => cat.items.forEach(item => item.checked = false));
      localStorage.setItem('shopping', JSON.stringify(shoppingList));
      renderShopping();
      showToast('已清空采购清单');
    });

    // 打卡
    document.getElementById('btn-checkin').addEventListener('click', () => {
      const today = new Date().toDateString();
      if (lastCheckin === today) {
        showToast('今日已打卡，明天再来吧～');
        return;
      }
      checkinDays++;
      lastCheckin = today;
      localStorage.setItem('checkin', checkinDays);
      localStorage.setItem('lastCheckin', lastCheckin);
      updateProfile();
      createConfetti();
      showToast(`打卡成功！连续 ${checkinDays} 天 💪`);
    });

    // 收藏页
    document.getElementById('btn-favorites').addEventListener('click', () => {
      if (favorites.length === 0) {
        showToast('暂无收藏，快去收藏喜欢的菜谱吧～');
        return;
      }
      switchTab('home');
      currentGoal = 'all';
      currentTime = 'all';
      document.querySelectorAll('.filter-tag').forEach(t => {
        if (t.dataset.type === 'all' || t.dataset.time === 'all') {
          t.classList.add('active');
        } else {
          t.classList.remove('active');
        }
      });
      renderRecipes();
      showToast(`查看了 ${favorites.length} 道收藏菜谱`);
    });

    // ============ 初始化 ============
    document.addEventListener('DOMContentLoaded', function() {
      renderRecipes();
      renderShopping();
      updateProfile();
    });
  </script>
</body>
</html>
